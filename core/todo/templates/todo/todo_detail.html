{% extends 'todo/base.html' %}

{% block content %}

<h2>{{ todo.title }}</h2>

<p>{{ todo.description }}</p>

<p>Status:
    {% if todo.completed %}
        ✅ Completed
    {% else %}
        ❌ Not Completed
    {% endif %}
</p>

<a href="{% url 'todo-update' todo.id %}">Edit</a> |
<a href="{% url 'todo-delete' todo.id %}">Delete</a> |
<a href="{% url 'todo-list' %}">Back</a>

{% endblock %}
