{% extends 'todo/base.html' %}

{% block content %}

<h2>Delete Todo</h2>

<p>Are you sure you want to delete "<strong>{{ todo.title }}</strong>"?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<a href="{% url 'todo-list' %}">Cancel</a>

{% endblock %}
